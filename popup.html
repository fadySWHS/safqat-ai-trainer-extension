<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; padding: 10px; font-family: sans-serif; direction: rtl; }
    input, button { width: 100%; margin-top: 10px; padding: 8px; box-sizing: border-box; }
    #status { margin-top: 10px; color: green; font-size: 14px; text-align: center; }
  </style>
</head>
<body>
  <div style="text-align:center; margin-bottom: 15px;">
    <h3>إعدادات أداة تدريب الذكاء الاصطناعي</h3>
    <p style="font-size: 12px; color: #555;">(Safqat AI Trainer)</p>
  </div>
  
  <label for="orKey">مفتاح OpenRouter:</label>
  <input type="password" id="orKey" placeholder="sk-or-v1-..." />
  
  <label for="repKey" style="display:block; margin-top:10px;">مفتاح Replicate (لتحويل الصوت):</label>
  <input type="password" id="repKey" placeholder="r8_..." />
  
  <label for="summaryLevel" style="display:block; margin-top:15px; font-weight:bold; color:#333;">مستوى التفاصيل (1 سريع - 10 تفصيلي):</label>
  <input type="range" id="summaryLevel" min="1" max="10" value="5" style="width:100%; margin-top:8px; cursor:pointer; accent-color:#6c5ce7;" />
  <div style="text-align:center; font-weight:bold; font-size:18px; color:#6c5ce7; margin-bottom:10px;" id="levelValue">5</div>

  <button id="saveBtn" style="background:#6c5ce7; color:white; border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer; width:100%; transition:0.2s;">حفظ البيانات</button>
  
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
